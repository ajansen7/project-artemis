# Artemis reverse proxy — nginx config
# Install: sudo ln -sf $(pwd)/nginx/artemis.conf /usr/local/etc/nginx/servers/artemis.conf
#   (macOS Homebrew) or /etc/nginx/sites-enabled/artemis.conf (Linux)

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to Artemis services
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # ─── SSL ──────────────────────────────────────────────────
    ssl_certificate     /usr/local/etc/nginx/ssl/artemis.crt;
    ssl_certificate_key /usr/local/etc/nginx/ssl/artemis.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ─── API backend (FastAPI on port 8000) ───────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (long-lived connections)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # ─── WebSocket endpoint for terminal (Plan 1) ─────────────
    location /api/terminal {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─── Frontend (Vite on port 5173) ─────────────────────────
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Vite HMR WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
